name: Build Binaries

on:
  workflow_call:
    inputs:
      release_name:
        description: "allow setting the release name"
        default: "latest"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Download binaries
        if: always() && !cancelled()
        uses: actions/download-artifact@v8
        with:
          name: Firmware

      - name: Delete release
        run: gh release delete ${{ inputs.release_name || 'latest' }} --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Generate Release
        uses: softprops/action-gh-release@v3
        if: always() && !cancelled()
        with:
          token: ${{ github.token }}
          name: Latest QMK Firmware
          tag_name: ${{ inputs.release_name || 'latest' }}
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          files: |
            **/*.hex
            **/*.bin
            **/*.uf2